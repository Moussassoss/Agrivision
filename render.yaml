services:
  - type: web
    name: cropvana-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cropvana-db
          property: connectionString
      - key: ISDA_USERNAME
        sync: false
      - key: ISDA_PASSWORD
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.3"

databases:
  - name: cropvana-db
    databaseName: cropvana
    user: cropvana
    plan: free
